# Local development only. The canonical copy used by ArgoCD lives in the GitOps repo
# and is seeded from this file during service scaffolding (PLACEHOLDER_ID is substituted).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: PLACEHOLDER_ID
spec:
  replicas: 2
  selector:
    matchLabels:
      app: PLACEHOLDER_ID
  template:
    metadata:
      labels:
        app: PLACEHOLDER_ID
    spec:
      containers:
        - name: PLACEHOLDER_ID
          image: registry/PLACEHOLDER_ID:latest
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
          readinessProbe:
            httpGet: { path: /ready, port: 8080 }
          env:
            - name: NEW_RELIC_APP_NAME
              value: "PLACEHOLDER_ID-production"