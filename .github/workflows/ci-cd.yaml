# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────
  # CI: lint, test, build
  # ──────────────────────────────────────────────
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || true

      - name: Lint
        run: |
          pip install ruff 2>/dev/null
          ruff check . || true

      - name: Test
        run: |
          pip install pytest 2>/dev/null
          pytest --tb=short || true

  # ──────────────────────────────────────────────
  # CD: build & push image, then open a PR in the
  #     GitOps repo to update the image tag.
  #     ArgoCD watches the GitOps repo and syncs.
  # ──────────────────────────────────────────────
  cd:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      packages: write   # push image to GHCR

    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Checkout the separate GitOps repo where ArgoCD reads manifests from.
      # GITOPS_REPO_TOKEN must have write access to that repo.
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/gitops   # replace with your GitOps repo
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops

      - name: Update image tag in GitOps repo
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.version }}
          SERVICE: ${{ github.event.repository.name }}
        run: |
          sed -i "s|image: .*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}|" \
            gitops/services/${SERVICE}/deployment.yaml

      - name: Open PR in GitOps repo
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops
          branch: deploy/${{ github.event.repository.name }}-${{ steps.meta.outputs.version }}
          commit-message: "chore(${{ github.event.repository.name }}): bump image to ${{ steps.meta.outputs.version }}"
          title: "deploy(${{ github.event.repository.name }}): ${{ steps.meta.outputs.version }}"
          body: |
            Automated image tag update from [${{ github.repository }}@${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          delete-branch: true
